services:
  postgres:
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Tenancy Postgres instances (P3/S9). Three new services share the P1
  # postgres digest (single image reference, three service definitions —
  # same image-cache hit, single supply-chain surface). Each has its own
  # internal volume; no host port binding (S5 rule).
  #
  # postgres-control-plane hosts the tenant registry and any other
  # operator-owned, jurisdiction-spanning data (D33). It is operationally
  # separate from tenant data planes and never co-located with one.
  #
  # postgres-tenant-a and postgres-tenant-b are the two test-set tenant
  # data planes (D32). Each hosts a single tenant's schema once S11
  # lands the per-tenant migration runner. Adding tenants beyond these
  # two in P3 requires editing this file; instance-creation-as-config
  # lands when production deployment context arrives.
  postgres-control-plane:
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    # Loopback-only host port binding so the S10 contract tests run
    # from `uv run pytest` on the laptop. This is a deliberate
    # exception to the S5 "only Caddy binds host ports" rule, scoped
    # to dev: control-plane needs host reachability for the
    # integration test path that the S9 instance addition created. The
    # binding is loopback-only (127.0.0.1) so external network does
    # not see it; production manifests remove the binding entirely.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_CONTROL_PLANE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CONTROL_PLANE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_CONTROL_PLANE_DB}
    volumes:
      - postgres_control_plane_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-tenant-a:
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    environment:
      POSTGRES_USER: ${POSTGRES_TENANT_A_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TENANT_A_PASSWORD}
      POSTGRES_DB: ${POSTGRES_TENANT_A_DB}
    volumes:
      - postgres_tenant_a_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  postgres-tenant-b:
    image: pgvector/pgvector:pg17@sha256:494dff7e67e7bc2c826b94c331364978d145ebb86fd338154138b084223b7f67
    environment:
      POSTGRES_USER: ${POSTGRES_TENANT_B_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TENANT_B_PASSWORD}
      POSTGRES_DB: ${POSTGRES_TENANT_B_DB}
    volumes:
      - postgres_tenant_b_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine@sha256:834468128c7696cec0ceea6172f7d692daf645ae51983ca76e39da54a97c570d
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  # Langfuse stack (P2/S4). Six services total: this langfuse-db (Postgres for metadata),
  # clickhouse (trace data plane), minio (S3-compatible blob store), langfuse-web (UI+API),
  # langfuse-worker (async ingestion), and the existing redis above (shared with Vadakkan
  # via DB number per D18 — Vadakkan uses DB 0, Langfuse uses DB 1).

  langfuse-db:
    image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: ${LANGFUSE_DB_NAME}
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:24.12@sha256:a65ca89ddbe8e04a05036dd7d7110a203256293b407b9359130ed5e4333f45ff
    user: "101:101"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  minio:
    image: cgr.dev/chainguard/minio:latest@sha256:a342898b433b4df054f20209980e58607f90a6ead4993424832597c65371648a
    entrypoint: sh
    # MinIO maps top-level dirs in /data to buckets. Create the langfuse bucket here;
    # Langfuse uses prefixes (events/, media/) within the single bucket.
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  langfuse-web:
    image: langfuse/langfuse:3.172.0@sha256:f04ea6d821ee45bdd4f1a76ff562a54e32e70fbb8d51a3621d1bb7bdef886b66
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://redis:6379/1
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_URL: https://langfuse.localhost
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3.172.0@sha256:ca36177abd02905d750056aa9029263a93736c1bd85471a6de820f5ca989ca99
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://redis:6379/1
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      HOSTNAME: 0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3030/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # LiteLLM (P2/S6). OpenAI-compatible gateway in front of Ollama (D4).
  # OTel emission to Langfuse via OTLP/HTTP per D27 — the Langfuse Python
  # SDK is deliberately not in the callbacks list. Auth header is
  # derived from the existing Langfuse keys via ops/derive_env.py and
  # arrives as ${LITELLM_OTEL_HEADERS} from .env.derived; OTEL_HEADERS is
  # comma-separated key=value with values URL-encoded per the OTel spec.
  # No host port binding (S5 rule); make smoke-llm reaches /v1/chat/...
  # by exec-ing into the caddy container (which has wget) and hitting
  # http://litellm:4000 on the internal network.
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.10-stable@sha256:6c82d338a60e7b273ae46bf1d8db814d2856ae010f96c44eeadde574d3893f76
    depends_on:
      ollama:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_LOG: WARNING
      OTEL_EXPORTER: otlp_http
      OTEL_ENDPOINT: http://langfuse-web:3000/api/public/otel/v1/traces
      OTEL_HEADERS: ${LITELLM_OTEL_HEADERS}
      OTEL_SERVICE_NAME: litellm
    volumes:
      - ./ops/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness'); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Ollama (P2/S6). Local LLM runtime; LiteLLM reaches it on the internal
  # Compose network at http://ollama:11434. No host port binding (D25 / S5
  # network-exposure rule). Default model is qwen2.5:7b per D15 and is
  # pulled into ollama_data via `make pull-model`; the volume persists the
  # ~5GB blob across `make up`/`make down` cycles. OLLAMA_HOST=0.0.0.0:11434
  # is required because the daemon defaults to 127.0.0.1 (loopback-only
  # inside the container) and would not be reachable from sibling services.
  ollama:
    image: ollama/ollama:0.22.0@sha256:05ab093b257a54318fba39293f1640d53b507d1edec8fa6ca2d3e1817c02e53b
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 5m
      OLLAMA_NOPRUNE: "1"
    volumes:
      - ollama_data:/root/.ollama
    # Memory ceiling sized for Qwen 2.5 7B at Ollama's default q4 quantization
    # (~5GB resident) plus KV cache and runtime overhead. Docker Desktop's VM
    # memory allocation must be at least this large for the limit to be real.
    mem_limit: 12g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # Vadakkan FastAPI application (P2/S7). Eleventh service in the stack.
  # Hexagonal layers + bounded contexts are loaded as workspace members
  # (D30); the image is built from apps/api/Dockerfile at the repo root
  # so the build context sees vadakkan/, contexts/, shared_kernel/, and
  # apps/. No host port binding (S5 rule); Caddy reverse-proxies on the
  # internal Compose network at /api/*.
  #
  # The image tag floats during dev iteration but is digest-pinned for
  # `make scan` and the security review checklist; rebuild with
  # `docker compose build vadakkan-api` and refresh the digest after.
  # The build:context: form is the development-mode default; the
  # production manifest replaces this with an upstream-image digest pin.
  vadakkan-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: vadakkan-api:dev@sha256:369d44ea71737cab751d85202c8e31acda2034a3463cf10d43ed6ad188934e06
    depends_on:
      litellm:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
    environment:
      VADAKKAN_PROFILE: dev
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
      # Tenancy: control-plane connection details (D33). Read by
      # ControlPlaneSettings in vadakkan/config/tenancy.py for the
      # registry adapter and the alembic env.py.
      POSTGRES_CONTROL_PLANE_USER: ${POSTGRES_CONTROL_PLANE_USER}
      POSTGRES_CONTROL_PLANE_PASSWORD: ${POSTGRES_CONTROL_PLANE_PASSWORD}
      POSTGRES_CONTROL_PLANE_DB: ${POSTGRES_CONTROL_PLANE_DB}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/health'); sys.exit(0)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_control_plane_data:
  postgres_tenant_a_data:
  postgres_tenant_b_data:
  redis_data:
  caddy_data:
  caddy_config:
  langfuse_db_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  ollama_data:
