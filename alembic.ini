# Alembic configuration for Vadakkan migration tracks (D34, D36).
#
# Two tracks live in this file as named sections per the cookbook
# "Run Multiple Alembic Environments from one .ini file" pattern:
#
#   - control_plane: tenant registry and any other operator-owned,
#     jurisdiction-spanning data (D33). Lands at S10.
#   - tenant: per-tenant data plane schemas (D32). Lands at S11.
#
# Each section has its own script_location pointing at a separate
# versions tree, so the two tracks have independent revision histories.
# Invoke as `alembic --name control_plane upgrade head` for the
# control-plane track. The per-tenant track is invoked programmatically
# from `ops/migrate.py` (D36): one Alembic invocation per registered
# tenant, with `sqlalchemy.url` injected at runtime.
#
# Control-plane connection details flow through `vadakkan/config/`
# (D19) — see `alembic/control_plane/env.py`. The per-tenant env.py
# reads the URL from the runtime-injected main option.

[control_plane]
script_location = alembic/control_plane
prepend_sys_path = .
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s
timezone = UTC

# Per-tenant track (S11, D36). `sqlalchemy.url` is intentionally not
# set here; the migration runner injects per-tenant URLs at runtime
# via `cfg.set_main_option("sqlalchemy.url", url)` before
# `command.upgrade(cfg, "head")`.
[tenant]
script_location = alembic/tenant
prepend_sys_path = .
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
